<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ World</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid #222; }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em; color: #fff; }
    header span { color: #666; font-size: 0.85rem; margin-left: 8px; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 720px; line-height: 1.6; }
    .msg.user { align-self: flex-end; background: #1a1a2e; padding: 12px 16px; border-radius: 12px 12px 2px 12px; color: #a0c4ff; }
    .msg.assistant { align-self: flex-start; background: #1a1a1a; padding: 12px 16px; border-radius: 2px 12px 12px 12px; border-left: 2px solid #e63946; }
    .msg.assistant .cypher { margin-top: 10px; background: #111; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 0.78rem; color: #888; white-space: pre-wrap; }
    .msg.thinking { color: #555; font-style: italic; font-size: 0.9rem; }
    #form { padding: 16px 24px; border-top: 1px solid #222; display: flex; gap: 10px; }
    #input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e5e5e5; font-size: 0.95rem; outline: none; }
    #input:focus { border-color: #e63946; }
    #input::placeholder { color: #555; }
    button { background: #e63946; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 0.95rem; cursor: pointer; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>BJJ World <span>knowledge graph chat</span></h1>
  </header>
  <div id="messages">
    <div class="msg assistant">Ask me anything about BJJ — positions, submissions, transitions, sweeps, guard passes, or how to get from one position to another.</div>
  </div>
  <form id="form">
    <input id="input" type="text" placeholder="e.g. What submissions can I attack from closed guard?" autocomplete="off" />
    <button type="submit" id="btn">Ask</button>
  </form>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const messages = document.getElementById('messages');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      input.value = '';
      btn.disabled = true;
      addMsg(question, 'user');

      const statusDiv = addMsg('', 'thinking');
      const answerDiv = addMsg('', 'assistant');
      let cypherPre = null;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
          for (const line of lines) {
            const event = JSON.parse(line.slice(6));

            if (event.type === 'status') {
              statusDiv.textContent = event.text;
            } else if (event.type === 'cypher') {
              if (!cypherPre) {
                cypherPre = document.createElement('pre');
                cypherPre.className = 'cypher';
                answerDiv.appendChild(cypherPre);
              }
              cypherPre.textContent = event.text;
            } else if (event.type === 'token') {
              if (!answerDiv.dataset.raw) answerDiv.dataset.raw = '';
              answerDiv.dataset.raw += event.text;
              const textEl = answerDiv.querySelector('.answer-text') || (() => {
                const el = document.createElement('div');
                el.className = 'answer-text';
                answerDiv.insertBefore(el, cypherPre || null);
                return el;
              })();
              textEl.innerHTML = marked.parse(answerDiv.dataset.raw);
              messages.scrollTop = messages.scrollHeight;
            } else if (event.type === 'done') {
              statusDiv.remove();
            } else if (event.type === 'error') {
              statusDiv.remove();
              answerDiv.textContent = `Error: ${event.text}`;
            }
          }
        }
      } catch (err) {
        statusDiv.remove();
        answerDiv.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
