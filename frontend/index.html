<!DOCTYPE html>
<html lang="en" data-mode="landing">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --bg:          oklch(0.10 0 0);
      --surface:     oklch(0.14 0 0);
      --surface-2:   oklch(0.17 0 0);
      --border:      oklch(0.22 0 0);
      --border-sub:  oklch(0.18 0 0);
      --ink:         oklch(0.93 0 0);
      --ink-2:       oklch(0.65 0 0);
      --ink-3:       oklch(0.55 0 0);
      --accent:      oklch(0.55 0.22 25);
      --accent-hi:   oklch(0.62 0.20 25);
      --accent-text: oklch(0.68 0.18 25);
      --mono-bg:     oklch(0.16 0.006 240);
      --mono-ink:    oklch(0.78 0.07 240);

      --sans:  'IBM Plex Sans', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', 'Fira Code', monospace;

      --c-position:   oklch(0.68 0.16 145);
      --c-submission: oklch(0.68 0.18 25);
      --c-sweep:      oklch(0.68 0.16 240);
      --c-guard_pass: oklch(0.75 0.15 60);
      --c-takedown:   oklch(0.70 0.16 295);
      --c-escape:     oklch(0.75 0.12 210);
      --c-counter:    oklch(0.70 0.18 38);
      --c-concept:    oklch(0.68 0.06 240);
      --c-competitor: oklch(0.84 0.13 78);
      --c-system:     oklch(0.70 0.17 355);
      --c-technique:  oklch(0.70 0.12 180);
    }

    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      background-image: radial-gradient(circle, oklch(0.19 0 0) 1px, transparent 1px);
      background-size: 28px 28px;
      background-attachment: fixed;
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Compact header (results + path modes) ──────────── */
    .app-header {
      display: none;
      flex-shrink: 0;
      align-items: center;
      gap: 16px;
      height: 52px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-sub);
    }
    [data-mode="results"]   .app-header,
    [data-mode="path"]      .app-header,
    [data-mode="technique"] .app-header,
    [data-mode="graph"]     .app-header { display: flex; }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-shrink: 0;
    }
    .header-brand-name {
      font-family: var(--sans);
      font-style: italic;
      font-weight: 600;
      font-size: 1rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .header-brand-sub {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ink-3);
      letter-spacing: 0.06em;
    }
    @media (max-width: 480px) { .header-brand-sub { display: none; } }

    .header-cmd {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px 3px 3px 12px;
      transition: border-color 150ms ease-out;
    }
    .header-cmd:focus-within { border-color: var(--accent); }
    .header-cmd-glyph {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--ink-3);
      flex-shrink: 0;
      margin-right: 8px;
      line-height: 1;
    }
    #header-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 0.88rem;
      padding: 5px 0;
      min-width: 0;
    }
    #header-input::placeholder { color: var(--ink-3); opacity: 1; }

    .header-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .header-btn {
      background: var(--accent);
      color: oklch(0.98 0 0);
      border: none;
      border-radius: 5px;
      padding: 6px 14px;
      font-family: var(--sans);
      font-size: 0.80rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease-out;
      white-space: nowrap;
    }
    .header-btn:hover:not(:disabled) { background: var(--accent-hi); }
    .header-btn:disabled { background: var(--surface-2); color: var(--ink-3); cursor: not-allowed; }
    .header-btn.stop-btn { background: var(--surface-2); color: var(--ink-2); }
    .header-btn.stop-btn:hover { background: var(--border); }
    .header-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .path-toggle-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-2);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 150ms, color 150ms;
      flex-shrink: 0;
    }
    .path-toggle-btn:hover { border-color: var(--ink-2); color: var(--ink); }
    .path-toggle-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Landing ────────────────────────────────────────── */
    .landing {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px 60px;
      overflow-y: auto;
    }
    [data-mode="landing"] .landing { display: flex; }

    .landing-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .landing-title {
      font-family: var(--sans);
      font-style: italic;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 10px;
      text-wrap: balance;
    }
    .landing-sub {
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--ink-3);
      letter-spacing: 0.10em;
    }

    .landing-cmd {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 6px 6px 20px;
      transition: border-color 150ms ease-out;
    }
    .landing-cmd:focus-within { border-color: var(--accent); }
    .landing-cmd-glyph {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--ink-3);
      flex-shrink: 0;
      margin-right: 14px;
      line-height: 1;
    }
    #landing-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 1rem;
      padding: 8px 0;
      min-width: 0;
    }
    #landing-input::placeholder { color: var(--ink-3); opacity: 1; }
    .landing-ask-btn {
      background: var(--accent);
      color: oklch(0.98 0 0);
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease-out;
      flex-shrink: 0;
    }
    .landing-ask-btn:hover { background: var(--accent-hi); }
    .landing-ask-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .hint-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
      max-width: 580px;
    }
    .hint-pill {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--ink-2);
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: border-color 150ms, color 150ms;
      line-height: 1.4;
    }
    .hint-pill:hover { border-color: var(--ink-2); color: var(--ink); }
    .hint-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 20px; }

    .landing-modes {
      width: 100%;
      max-width: 580px;
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .landing-mode {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border: none;
      border-bottom: 1px solid var(--border-sub);
      background: none;
      width: 100%;
      cursor: pointer;
      text-align: left;
      transition: background 120ms ease-out;
    }
    .landing-mode:last-child { border-bottom: none; }
    .landing-mode:hover { background: var(--surface); }
    .landing-mode:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 0; }
    .landing-mode-glyph {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink-3);
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      transition: color 120ms;
    }
    .landing-mode:hover .landing-mode-glyph { color: var(--ink-2); }
    .landing-mode-body {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .landing-mode-name {
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink);
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }
    .landing-mode-desc {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--ink-3);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .landing-mode-arrow {
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--ink-3);
      flex-shrink: 0;
      transition: color 120ms, transform 120ms;
    }
    .landing-mode:hover .landing-mode-arrow {
      color: var(--accent-text);
      transform: translateX(3px);
    }
    @media (max-width: 420px) {
      .landing-mode-desc { display: none; }
    }

    .upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      width: 100%;
      max-width: 580px;
      margin-top: 16px;
      padding: 12px 20px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color 150ms ease-out, background 150ms ease-out;
    }
    .upload-zone:hover { border-color: var(--ink-3); }
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: color-mix(in oklch, var(--accent) 6%, transparent);
    }
    .upload-zone-glyph {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--ink-3);
      line-height: 1;
      transition: color 150ms ease-out;
    }
    .upload-zone:hover .upload-zone-glyph { color: var(--ink-2); }
    .upload-zone-text {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-2);
      letter-spacing: 0.02em;
    }
    .upload-zone-meta {
      font-family: var(--mono);
      font-size: 0.63rem;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .upload-zone-error {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent-text);
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* ── Results ────────────────────────────────────────── */
    .results-area {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px 48px;
    }
    [data-mode="results"] .results-area { display: block; }
    .results-area::-webkit-scrollbar { width: 3px; }
    .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Entry = one Q&A pair */
    @keyframes entry-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entry { animation: entry-in 200ms ease-out both; }

    .entry-q {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }
    .entry-q-glyph {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 3px;
    }
    .entry-q-text {
      font-family: var(--mono);
      font-size: 0.80rem;
      color: var(--ink-2);
      line-height: 1.55;
    }

    .entry-a {
      background: var(--surface);
      border: 1px solid var(--border-sub);
      border-radius: 10px;
      padding: 22px 24px;
    }

    /* Answer prose */
    .answer-text {
      font-family: var(--sans);
      font-size: 0.97rem;
      line-height: 1.78;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-wrap: pretty;
      max-width: 64ch;
    }
    .answer-text h1, .answer-text h2, .answer-text h3 {
      font-family: var(--sans);
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 1em 0 0.3em;
      text-wrap: balance;
    }
    .answer-text h1 { font-size: 1.15rem; }
    .answer-text h2 { font-size: 1.05rem; }
    .answer-text h3 { font-size: 1rem; }
    .answer-text h1:first-child, .answer-text h2:first-child, .answer-text h3:first-child { margin-top: 0; }
    .answer-text p { margin: 0.5em 0; }
    .answer-text p:first-child { margin-top: 0; }
    .answer-text ul, .answer-text ol { padding-left: 1.5em; margin: 0.5em 0; }
    .answer-text li { margin: 0.2em 0; }
    .answer-text strong { font-weight: 600; font-size: 0.94em; color: var(--ink); }
    .answer-text code {
      font-family: var(--mono);
      font-size: 0.80em;
      background: var(--mono-bg);
      color: var(--mono-ink);
      padding: 0.1em 0.4em;
      border-radius: 3px;
    }
    .answer-text a { color: var(--accent-text); text-decoration: underline; text-underline-offset: 3px; }

    /* Streaming cursor */
    .entry-a[data-streaming] .answer-text::after {
      content: '▋';
      font-family: var(--mono);
      font-size: 0.80em;
      color: var(--accent);
      animation: blink 0.72s ease-in-out infinite;
      margin-left: 1px;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Status row inside entry-a */
    .entry-status {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .status-dot {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 0.35; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    .status-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-3);
      letter-spacing: 0.02em;
    }

    /* Error card */
    .entry-error {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .entry-error-msg {
      font-family: var(--sans);
      font-size: 0.88rem;
      color: var(--ink-2);
    }
    .retry-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-2);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 150ms, color 150ms;
      flex-shrink: 0;
    }
    .retry-btn:hover { border-color: var(--ink-2); color: var(--ink); }

    /* Videos */
    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-sub);
    }
    .video-card { background: var(--surface-2); border: 1px solid var(--border-sub); border-radius: 8px; overflow: hidden; }
    .video-label { padding: 7px 12px; font-family: var(--mono); font-size: 0.70rem; color: var(--ink-2); border-bottom: 1px solid var(--border-sub); letter-spacing: 0.03em; }
    .video-card iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

    /* ── Node chips ─────────────────────────────────────── */
    .nc {
      font-family: var(--mono);
      font-size: 0.80em;
      padding: 0.1em 0.38em;
      border-radius: 3px;
      background: color-mix(in oklch, var(--nc-color) 10%, transparent);
      color: var(--nc-color);
      white-space: nowrap;
      vertical-align: baseline;
      cursor: pointer;
      transition: background 120ms;
    }
    .nc:hover { background: color-mix(in oklch, var(--nc-color) 20%, transparent); }
    .nc-position   { --nc-color: var(--c-position); }
    .nc-submission { --nc-color: var(--c-submission); }
    .nc-sweep      { --nc-color: var(--c-sweep); }
    .nc-guard_pass { --nc-color: var(--c-guard_pass); }
    .nc-takedown   { --nc-color: var(--c-takedown); }
    .nc-escape     { --nc-color: var(--c-escape); }
    .nc-counter    { --nc-color: var(--c-counter); }
    .nc-concept    { --nc-color: var(--c-concept); }
    .nc-competitor { --nc-color: var(--c-competitor); }
    .nc-system     { --nc-color: var(--c-system); }
    .nc-technique  { --nc-color: var(--c-technique); }

    /* ── Path Finder ────────────────────────────────────── */
    .path-area {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px 48px;
    }
    [data-mode="path"] .path-area { display: block; }

    .path-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .path-head h2 {
      font-family: var(--sans);
      font-style: italic;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-wrap: balance;
    }
    .path-head p { font-size: 0.85rem; color: var(--ink-2); line-height: 1.55; }

    .path-controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .path-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 200px; }
    .path-field-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-3);
      letter-spacing: 0.07em;
    }
    .path-combobox {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 0.88rem;
      outline: none;
      width: 100%;
      transition: border-color 150ms;
    }
    .path-combobox:focus { border-color: var(--accent); }
    .path-combobox::placeholder { color: var(--ink-3); }
    #path-btn {
      background: var(--accent);
      color: oklch(0.98 0 0);
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms;
      white-space: nowrap;
      align-self: flex-end;
    }
    #path-btn:hover:not(:disabled) { background: var(--accent-hi); }
    #path-btn:disabled { background: var(--surface-2); color: var(--ink-3); cursor: not-allowed; }
    #path-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    #path-result { display: none; }

    .path-meta {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink-2);
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }
    .path-meta strong { color: var(--ink); font-weight: 500; }

    .step-sequence { display: flex; flex-direction: column; }
    .step-item { display: flex; flex-direction: column; }
    .step-node {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--surface);
      border: 1px solid var(--border-sub);
      border-radius: 6px;
    }
    .step-badge {
      font-family: var(--mono);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .step-badge.position   { color: var(--c-position); }
    .step-badge.submission { color: var(--c-submission); }
    .step-badge.sweep      { color: var(--c-sweep); }
    .step-badge.guard_pass { color: var(--c-guard_pass); }

</head>
<body>

  <!-- ── Compact header (results + path modes) ── -->
  <header class="app-header" aria-label="BJJ World">

      <span class="header-brand-name">BJJ World</span>

  <!-- ── Landing ── -->

        autofocus />

    <div class="hint-pills" role="list" aria-label="Example questions">

        onclick="useHint(this)">What can I attack from closed guard?</button>
      <button class="hint-pill" role="listitem" type="button"
        onclick="useHint(this)">How does Gordon Ryan approach back control?</button>
      <button class="hint-pill" role="listitem" type="button"
        onclick="useHint(this)">What are my options from half guard?</button>

    <nav class="landing-modes" aria-label="Explore tools">
      <button class="landing-mode" type="button" onclick="togglePath()">
        <span class="landing-mode-glyph" aria-hidden="true">◆</span>
        <span class="landing-mode-body">
          <span class="landing-mode-name">Path Finder</span>
          <span class="landing-mode-desc">Shortest route between any two positions</span>
        </span>
        <span class="landing-mode-arrow" aria-hidden="true">→</span>

      <button class="landing-mode" type="button" onclick="toggleGraph()">

        onclick="document.getElementById('video-file-input').click()">

          <span class="landing-mode-desc">Upload a match — AI reads every position</span>

    <label class="upload-zone" id="upload-zone" for="video-file-input">

          <label class="path-field-label" for="path-from-input">FROM</label>

            autocomplete="off" aria-label="Starting technique" />

          <label class="path-field-label" for="path-to-input">TO</label>

            autocomplete="off" aria-label="Destination technique" />

  <!-- ── Graph ── -->

    <div class="graph-loading" id="graph-loading">Loading graph…</div>

    <div class="graph-legend" id="graph-legend"></div>
  </div>

  <!-- ── Technique Page ── -->
  <div class="technique-area" role="main" aria-label="Technique details">
    <div class="tp-inner" id="tp-content"></div>
  </div>

  <script>
    // ── Mode ───────────────────────────────────────────────
    function setMode(mode) {
      document.documentElement.dataset.mode = mode;
      const pathToggle = document.getElementById('path-toggle-btn');
      if (pathToggle) {
        pathToggle.textContent = mode === 'path' ? '← Chat' : 'Path →';
        pathToggle.setAttribute('aria-label', mode === 'path' ? 'Back to chat' : 'Open Path Finder');
      }
    }

    function togglePath() {
      const current = document.documentElement.dataset.mode;
      if (current === 'path') {
        setMode(hasResults ? 'results' : 'landing');
      } else {
        setMode('path');
        if (!pathLoaded) loadPathNodes();
      }
    }

    let hasResults = false;

    // ── Node chips ─────────────────────────────────────────
    let nodeList = [];
    let chipRe = null;

    async function loadNodes() {
      try {
        const data = await fetch('/api/nodes').then(r => r.json());
        nodeList = data.sort((a, b) => b.name.length - a.name.length);
        const escaped = nodeList.map(n => n.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        chipRe = new RegExp('\\b(?:' + escaped.join('|') + ')\\b', 'gi');
      } catch (e) {
        console.warn('Node chip load failed', e);
      }
    }

    function applyChips(container) {
      if (!chipRe || !nodeList.length) return;
      walkForChips(container);
    }

    function walkForChips(el) {
      const skip = new Set(['CODE', 'PRE', 'SCRIPT', 'STYLE']);
      for (const child of [...el.childNodes]) {
        if (child.nodeType === Node.TEXT_NODE) {
          chipifyTextNode(child);
        } else if (child.nodeType === Node.ELEMENT_NODE
          && !skip.has(child.tagName)
          && !child.classList.contains('nc')) {
          walkForChips(child);
        }
      }
    }

    function chipifyTextNode(textNode) {
      const text = textNode.textContent;
      chipRe.lastIndex = 0;
      if (!chipRe.test(text)) return;
      chipRe.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0, match;
      while ((match = chipRe.exec(text)) !== null) {
        if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
        const node = nodeList.find(n => n.name.toLowerCase() === match[0].toLowerCase());
        if (node) {
          const span = document.createElement('span');
          span.className = `nc nc-${node.type}`;
          span.textContent = match[0];
          span.title = node.type.replace('_', ' ');
          span.setAttribute('role', 'button');
          span.setAttribute('tabindex', '0');
          span.addEventListener('click', () => loadTechnique(node.id));
          span.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') loadTechnique(node.id); });
          frag.appendChild(span);
        } else {
          frag.appendChild(document.createTextNode(match[0]));
        }
        last = match.index + match[0].length;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      textNode.replaceWith(frag);
    }

    // ── Query helpers ───────────────────────────────────────
    function useHint(btn) { fillQuery(btn.textContent.trim()); }

    function fillQuery(text) {
      const mode = document.documentElement.dataset.mode;
      if (mode === 'landing') {
        document.getElementById('landing-input').value = text;
        document.getElementById('landing-input').focus();
      } else {
        document.getElementById('header-input').value = text;
        document.getElementById('header-input').focus();
      }
      if (mode === 'path') setMode(hasResults ? 'results' : 'landing');
    }

    // ── Chat ────────────────────────────────────────────────
    const entries      = document.getElementById('entries');
    const conversationHistory = [];
    let abortCtrl = null;
    let lastQuestion  = '';

    function isDirectVideoUrl(text) {
      return /^https?:\/\/.+\.(mp4|mov|webm|mkv|avi|m4v)(\?.*)?$/i.test(text) ||
        /dropbox\.com\//.test(text) ||
        /dropboxusercontent\.com\//.test(text) ||
        /drive\.google\.com\/file\//.test(text);
    }

    document.getElementById('landing-form').addEventListener('submit', e => {
      e.preventDefault();
      const q = document.getElementById('landing-input').value.trim();
      document.getElementById('landing-input').value = '';
      if (!q) return;
      if (isDirectVideoUrl(q)) { submitDirectVideoAnalysis(q); } else { submitQuestion(q); }
    });

    document.getElementById('header-form').addEventListener('submit', e => {
      e.preventDefault();
      const q = document.getElementById('header-input').value.trim();
      document.getElementById('header-input').value = '';
      if (!q) return;
      if (isDirectVideoUrl(q)) { submitDirectVideoAnalysis(q); } else { submitQuestion(q); }

    document.getElementById('header-stop-btn').addEventListener('click', () => {

    });

    async function submitQuestion(question) {
      // Cancel any active stream
      if (abortCtrl) abortCtrl.abort();
      abortCtrl = new AbortController();

      lastQuestion = question;
      conversationHistory.push({ role: 'user', content: question });

      if (!hasResults) { hasResults = true; setMode('results'); }

      // Build entry
      const entry = document.createElement('div');
      entry.className = 'entry';

      const entryQ = document.createElement('div');
      entryQ.className = 'entry-q';
      entryQ.innerHTML = `<span class="entry-q-glyph" aria-hidden="true">▸</span><span class="entry-q-text">${escHtml(question)}</span>`;

      const entryA = document.createElement('div');
      entryA.className = 'entry-a';
      entryA.setAttribute('data-streaming', '');

      const statusEl = document.createElement('div');
      statusEl.className = 'entry-status';
      statusEl.innerHTML = '<span class="status-dot" aria-hidden="true"></span><span class="status-label">Searching…</span>';
      entryA.appendChild(statusEl);

      entry.appendChild(entryQ);
      entry.appendChild(entryA);
      entries.appendChild(entry);
      entry.scrollIntoView({ behavior: 'smooth', block: 'start' });

      setStreaming(true);

      let buffer = '';
      let textEl = null;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, history: conversationHistory.slice(-6) }),
          signal: abortCtrl.signal
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let sseBuffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          sseBuffer += decoder.decode(value, { stream: true });
          const parts = sseBuffer.split('\n\n');
          sseBuffer = parts.pop();

          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'status') {
              const lbl = statusEl.querySelector('.status-label');
              if (lbl) lbl.textContent = event.text;

            } else if (event.type === 'token') {
              if (statusEl.parentNode) statusEl.remove();
              if (!textEl) {
                textEl = document.createElement('div');
                textEl.className = 'answer-text';
                entryA.appendChild(textEl);
              }
              buffer += event.text;
              textEl.innerHTML = marked.parse(buffer);
              entry.scrollIntoView({ behavior: 'smooth', block: 'end' });

            } else if (event.type === 'videos') {
              const videosDiv = document.createElement('div');
              videosDiv.className = 'videos';
              videosDiv.innerHTML = event.videos.map(v => {
                const id = new URL(v.url).searchParams.get('v');
                if (!id) return '';
                return `<div class="video-card">
                  <div class="video-label">${escHtml(v.name)}</div>
                  <iframe src="https://www.youtube.com/embed/${id}"
                    title="${escHtml(v.name)} — BJJ tutorial"
                    allowfullscreen loading="lazy"></iframe>
                </div>`;
              }).join('');
              entryA.appendChild(videosDiv);

            } else if (event.type === 'done') {
              entryA.removeAttribute('data-streaming');
              if (statusEl.parentNode) statusEl.remove();
              if (textEl) applyChips(textEl);
              if (buffer) conversationHistory.push({ role: 'assistant', content: buffer });

            } else if (event.type === 'error') {
              entryA.removeAttribute('data-streaming');
              showError(entryA, event.text, question);
            }
          }
        }
      } catch (err) {
        entryA.removeAttribute('data-streaming');
        if (err.name === 'AbortError') {
          if (statusEl.parentNode) statusEl.remove();
          if (!textEl && buffer === '') {
            entryA.innerHTML = '';
            const cancelled = document.createElement('p');
            cancelled.style.cssText = 'font-family:var(--mono);font-size:0.75rem;color:var(--ink-3)';
            cancelled.textContent = 'Stopped.';
            entryA.appendChild(cancelled);
          }
        } else {
          showError(entryA, err.message, question);
        }
      } finally {
        setStreaming(false);
        abortCtrl = null;
      }
    }

    function showError(container, msg, question) {
      if (container.querySelector('.entry-status')) {
        container.querySelector('.entry-status').remove();
      }
      const err = document.createElement('div');
      err.className = 'entry-error';
      err.innerHTML = `
        <span class="entry-error-msg">${escHtml(msg || 'Something went wrong — try asking again.')}</span>
        <button class="retry-btn" type="button">Retry</button>`;
      err.querySelector('.retry-btn').addEventListener('click', () => {
        container.innerHTML = '';
        const statusEl = document.createElement('div');
        statusEl.className = 'entry-status';
        statusEl.innerHTML = '<span class="status-dot"></span><span class="status-label">Retrying…</span>';
        container.appendChild(statusEl);
        submitQuestion(question);
      });
      container.appendChild(err);
      console.warn('Chat error:', msg);
    }

    function setStreaming(on) {
      document.getElementById('header-ask-btn').style.display  = on ? 'none' : '';
      document.getElementById('header-stop-btn').style.display = on ? '' : 'none';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function nearestFrame(frameStore, timestamp) {
      if (frameStore.size === 0) return null;
      let best = null, bestDist = Infinity;
      for (const [ts, data] of frameStore) {
        const dist = Math.abs(ts - timestamp);
        if (dist < bestDist) { bestDist = dist; best = data; }
      }
      return best;
    }

    function buildTimelineRow(event, frameStore) {
      const BADGE_LABELS = { position:'position', transition:'transition', submission_attempt:'sub attempt', submission:'submission ✓', sweep:'sweep', guard_pass:'guard pass', escape:'escape', takedown:'takedown' };
      const badge = event.badge || 'position';
      const thumb = nearestFrame(frameStore, event.timestamp);
      const row = document.createElement('div');
      row.className = 'timeline-row';

      const thumbEl = thumb
        ? `<img class="timeline-thumb" src="data:image/jpeg;base64,${thumb}" alt="">`
        : '<div class="timeline-thumb"></div>';

      const relatedHtml = (event.related || []).length > 0
        ? `<div class="timeline-related">${event.related.map(n =>
            `<span class="nc nc-${escHtml(n.type)}" role="button" tabindex="0" title="${escHtml(n.type.replace('_',' '))}">${escHtml(n.name)}</span>`
          ).join('')}</div>`
        : '';

      row.innerHTML = `
        ${thumbEl}
        <div class="timeline-info">
          <div class="timeline-meta">
            <span class="timeline-ts">${escHtml(event.label)}</span>
            <span class="timeline-badge ${escHtml(badge)}">${escHtml(BADGE_LABELS[badge] || badge)}</span>
          </div>
          <span class="timeline-desc">${escHtml(event.description)}</span>
          ${relatedHtml}
        </div>`;

      // wire up related chip clicks
      row.querySelectorAll('.timeline-related .nc').forEach(chip => {
        const name = chip.textContent;
        chip.addEventListener('click', () => fillQuery(`Tell me more about ${name}`));
        chip.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fillQuery(`Tell me more about ${name}`); });
      });

      return row;
    }

    // ── File upload analysis ────────────────────────────────
    const MAX_UPLOAD_BYTES = 60 * 1024 * 1024;
    document.getElementById('video-file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';
      if (file.size > MAX_UPLOAD_BYTES) {
        showUploadError(`File too large (${(file.size / 1e6).toFixed(0)} MB — max 60 MB)`);
        return;
      }
      submitFileAnalysis(file);
    });

    function showUploadError(msg) {
      const zone = document.getElementById('upload-zone');
      if (!zone) return;
      let err = zone.querySelector('.upload-zone-error');
      if (!err) {
        err = document.createElement('span');
        err.className = 'upload-zone-error';
        zone.appendChild(err);
      }
      err.textContent = msg;
      clearTimeout(zone._errTimer);
      zone._errTimer = setTimeout(() => { if (err.parentNode) err.remove(); }, 4000);
    }

    const uploadZone = document.getElementById('upload-zone');
    if (uploadZone) {
      uploadZone.addEventListener('dragover', e => {
        e.preventDefault();
        uploadZone.classList.add('drag-over');
      });
      uploadZone.addEventListener('dragleave', e => {
        if (!uploadZone.contains(e.relatedTarget)) uploadZone.classList.remove('drag-over');
      });
      uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (!file || !file.type.startsWith('video/')) return;
        if (file.size > MAX_UPLOAD_BYTES) { showUploadError(`File too large (${(file.size / 1e6).toFixed(0)} MB — max 60 MB)`); return; }
        submitFileAnalysis(file);
      });
    }

              if (!fightTimeline) continue;
              const row = buildTimelineRow(event, frameStore);
              fightTimeline.appendChild(row);
              entry.scrollIntoView({ behavior: 'smooth', block: 'end' });

            } else if (event.type === 'analysis-text') {
              if (statusEl.parentNode) statusEl.remove();
              const pre = document.createElement('p');
              pre.className = 'analysis-raw';
              pre.textContent = event.text;
              entryA.appendChild(pre);

            } else if (event.type === 'done') {
              entryA.removeAttribute('data-streaming');
              if (statusEl.parentNode) statusEl.remove();
              if (fightTimeline) fightTimeline.querySelectorAll('.timeline-desc').forEach(el => applyChips(el));
              if (fightSummaryEl) applyChips(fightSummaryEl);

            } else if (event.type === 'error') {
              entryA.removeAttribute('data-streaming');
              showError(entryA, event.text, url);
            }
          }
        }
      } catch (err) {
        entryA.removeAttribute('data-streaming');
        if (err.name !== 'AbortError') showError(entryA, err.message, url);
      } finally {
        setStreaming(false);
        abortCtrl = null;
      }
    }

    // ── Path Finder ─────────────────────────────────────────
    let pathLoaded = false;
    let pathNodeMap = {}; // name.toLowerCase() → id

    async function loadPathNodes() {
      try {
        const data = await fetch('/api/nodes').then(r => r.json());
        const relevant = data.filter(n =>
          ['position','submission','sweep','guard_pass','takedown','escape'].includes(n.type)
        );
        const dl = document.getElementById('path-nodes-list');
        dl.innerHTML = relevant.map(n => `<option value="${escHtml(n.name)}">`).join('');
        relevant.forEach(n => { pathNodeMap[n.name.toLowerCase()] = n.id; });
        pathLoaded = true;
      } catch (err) {
        console.error('Failed to load path nodes', err);
      }
    }

    async function findPath() {
      const fromName = document.getElementById('path-from-input').value.trim();
      const toName   = document.getElementById('path-to-input').value.trim();
      const btn    = document.getElementById('path-btn');
      const result = document.getElementById('path-result');

      const fromId = pathNodeMap[fromName.toLowerCase()];
      const toId   = pathNodeMap[toName.toLowerCase()];

      if (!fromId || !toId) {
        result.style.display = 'block';
        result.innerHTML = '<p class="path-no-result">Type an exact technique name from the suggestions.</p>';
        return;
      }
      if (fromId === toId) {
        result.style.display = 'block';
        result.innerHTML = '<p class="path-no-result">Pick two different techniques.</p>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Finding…';
      result.style.display = 'none';

      try {
        const data = await fetch(`/api/path?from=${fromId}&to=${toId}`).then(r => r.json());
        result.style.display = 'block';

        if (!data.found) {
          result.innerHTML = '<p class="path-no-result">No path found between these two techniques.</p>';
          return;
        }

        const stepsHtml = data.steps.map((step, i) => {
          const badge = step.type.replace('_', ' ');
          const node = `<div class="step-node">
            <span class="step-badge ${step.type}">${badge}</span>
            <span class="step-name">${escHtml(step.name)}</span>
          </div>`;
          if (i < data.transitions.length) {
            return `<div class="step-item">${node}
              <div class="step-connector">
                <div class="step-line"></div>
                <span class="step-rel">${escHtml(data.transitions[i])}</span>
              </div></div>`;
          }
          return `<div class="step-item">${node}</div>`;
        }).join('');

        const first = data.steps[0].name;
        const last  = data.steps[data.steps.length - 1].name;

        result.innerHTML = `
          <div class="path-meta">${data.steps.length} steps — <strong>${escHtml(first)}</strong> to <strong>${escHtml(last)}</strong></div>
          <div class="step-sequence">${stepsHtml}</div>
          <div id="path-explanation"></div>`;

        const pathStr = data.steps.map((s, i) =>
          i < data.transitions.length ? `${s.name} --[${data.transitions[i]}]-->` : s.name
        ).join(' ');

        const expEl = document.getElementById('path-explanation');
        const resp  = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: `Explain this BJJ path step by step as a coach: ${pathStr}. Be concise and practical.` })
        });

        const reader  = resp.body.getReader();
        const decoder = new TextDecoder();
        let sseBuffer = '', text = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          sseBuffer += decoder.decode(value, { stream: true });
          const parts = sseBuffer.split('\n\n');
          sseBuffer = parts.pop();
          for (const part of parts) {
            const line = part.trim();
            if (!line.startsWith('data: ')) continue;
            let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
            if (ev.type === 'token') { text += ev.text; expEl.innerHTML = marked.parse(text); }
          }
        }
      } catch (err) {
        result.innerHTML = `<p class="path-no-result">Something went wrong — try again.</p>`;
        result.style.display = 'block';
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Find Path';
      }
    }

    // ── Graph visualizer ────────────────────────────────────
    let graphInitialized = false;

    const TYPE_COLORS = {};
    function typeColor(type) {
      if (!TYPE_COLORS[type]) {
        TYPE_COLORS[type] = getComputedStyle(document.documentElement)
          .getPropertyValue(`--c-${type}`).trim() || 'oklch(0.55 0 0)';
      }
      return TYPE_COLORS[type];
    }

    function toggleGraph() {
      if (document.documentElement.dataset.mode === 'graph') {
        setMode(hasResults ? 'results' : 'landing');
      } else {
        setMode('graph');
        if (!graphInitialized) initGraph();
      }
    }

    async function initGraph() {
      graphInitialized = true;
      const loadingEl = document.getElementById('graph-loading');
      const svgEl = document.getElementById('graph-svg');

      let data;
      try {
        data = await fetch('/api/graph').then(r => r.json());
      } catch {
        loadingEl.textContent = 'Failed to load graph.';
        return;
      }
      loadingEl.remove();

      const nodes = data.nodes;
      const edges = data.edges;
      const W = svgEl.clientWidth || window.innerWidth;
      const H = svgEl.clientHeight || window.innerHeight - 52;

      // Adjacency set for hover highlight
      const adjacency = new Set();
      edges.forEach(e => {
        adjacency.add(`${e.source}§${e.target}`);
        adjacency.add(`${e.target}§${e.source}`);
      });
      const areLinked = (a, b) => adjacency.has(`${a.id}§${b.id}`);

      const svg = d3.select('#graph-svg');
      const g = svg.append('g');

      const zoom = d3.zoom().scaleExtent([0.05, 8])
        .on('zoom', e => g.attr('transform', e.transform));
      svg.call(zoom).on('dblclick.zoom', null);

      const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(edges).id(d => d.id).distance(70).strength(0.35))
        .force('charge', d3.forceManyBody().strength(-260))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collide', d3.forceCollide(18));

      const link = g.append('g')
        .selectAll('line').data(edges).join('line')
        .attr('class', 'graph-edge');

      const node = g.append('g')
        .selectAll('g').data(nodes).join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
        )
        .on('click', (e, d) => { e.stopPropagation(); loadTechnique(d.id); })
        .on('mouseenter', (e, d) => {
          node.select('circle')
            .attr('r', n => n === d ? 11 : 8)
            .attr('fill-opacity', n => n === d || areLinked(n, d) ? 0.95 : 0.15);
          node.select('text')
            .attr('opacity', n => n === d || areLinked(n, d) ? 1 : 0.1);
          link
            .attr('stroke-opacity', l => l.source === d || l.target === d ? 0.9 : 0.04)
            .attr('stroke', l => l.source === d || l.target === d
              ? getComputedStyle(document.documentElement).getPropertyValue('--accent-text').trim()
              : 'oklch(0.28 0 0)');
        })
        .on('mouseleave', () => {
          node.select('circle').attr('r', 8).attr('fill-opacity', 0.85);
          node.select('text').attr('opacity', 1);
          link.attr('stroke-opacity', 0.5).attr('stroke', 'oklch(0.28 0 0)');
        });

      node.append('circle')
        .attr('r', 8)
        .attr('fill', d => typeColor(d.type))
        .attr('fill-opacity', 0.85)
        .attr('stroke', d => typeColor(d.type))
        .attr('stroke-width', 1.5)
        .attr('stroke-opacity', 0.4);

      node.append('text')
        .text(d => d.name)
        .attr('dy', -12)
        .attr('class', 'graph-label');

      sim.on('tick', () => {
        link
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
      });

      // Auto-fit once layout settles
      sim.on('end', () => {
        try {
          const b = g.node().getBBox();
          const scale = 0.88 * Math.min(W / b.width, H / b.height);
          const tx = W / 2 - scale * (b.x + b.width / 2);
          const ty = H / 2 - scale * (b.y + b.height / 2);
          svg.transition().duration(800)
            .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        } catch {}
      });

      // Legend + filters
      const seenTypes = [...new Set(nodes.map(n => n.type))].sort();

      const legend = document.getElementById('graph-legend');
      legend.innerHTML = seenTypes.map(t => `
        <div class="graph-legend-row">
          <div class="graph-legend-dot" style="background:${typeColor(t)}"></div>
          <span>${t.replace(/_/g, ' ')}</span>
        </div>`).join('');

      const activeTypes = new Set(seenTypes);

      function applyFilter() {
        node
          .style('opacity', d => activeTypes.has(d.type) ? 1 : 0)
          .style('pointer-events', d => activeTypes.has(d.type) ? 'all' : 'none');
        link.style('opacity', l =>
          activeTypes.has(l.source.type) && activeTypes.has(l.target.type) ? 0.5 : 0);
      }

      const filterBar = document.getElementById('graph-filters');
      seenTypes.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'graph-filter-btn active';
        btn.style.setProperty('--fc', typeColor(t));
        btn.textContent = t.replace(/_/g, ' ');
        btn.addEventListener('click', () => {
          if (activeTypes.has(t)) {
            activeTypes.delete(t);
            btn.classList.remove('active');
          } else {
            activeTypes.add(t);
            btn.classList.add('active');
          }
          applyFilter();
        });
        filterBar.appendChild(btn);
      });
    }

    // ── Technique page ──────────────────────────────────────
    const TP_ACTION_LABEL = {
      attack_with:'Attacks', sweep_with:'Sweeps', pass_with:'Guard passes',
      transition_to:'Transitions to', follow_up:'Follow-ups', recover_to:'Recovers to',
      escape_with:'Escapes', counters:'Counters', requires:'Requires',
      developed:'Developed', centers_on:'Centers on', features:'Features',
      known_for:'Known for', coached_by:'Coached by',
    };

    function ytId(url) {
      if (!url) return null;
      const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/);
      return m ? m[1] : null;
    }

    function tpChip(node) {
      const span = document.createElement('span');
      span.className = `nc nc-${node.type}`;
      span.textContent = node.name;
      span.title = node.type.replace(/_/g, ' ');
      span.setAttribute('role', 'button');
      span.setAttribute('tabindex', '0');
      span.addEventListener('click', () => loadTechnique(node.id));
      span.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') loadTechnique(node.id); });
      return span;
    }

    function renderTechnique(data) {
      const container = document.getElementById('tp-content');
      container.innerHTML = '';

      // Back
      const back = document.createElement('div');
      back.className = 'tp-back';
      back.innerHTML = `<button onclick="history.back()">← back</button>`;
      container.appendChild(back);

      // Hero
      const hero = document.createElement('div');
      hero.className = 'tp-hero';
      const gi = data.gi_requirement && data.gi_requirement !== 'both'
        ? `<span class="tp-gi">${escHtml(data.gi_requirement)}</span>` : '';
      hero.innerHTML = `
        <div class="tp-meta">
          <span class="tp-type ${escHtml(data.type)}">${escHtml(data.type.replace(/_/g,' '))}</span>
          ${gi}
        </div>
        <h1 class="tp-name">${escHtml(data.name)}</h1>
        ${data.description ? `<p class="tp-desc">${escHtml(data.description)}</p>` : ''}`;
      container.appendChild(hero);

      // Video
      const vid = ytId(data.video_url);
      if (vid) {
        const vidEl = document.createElement('div');
        vidEl.className = 'tp-video';
        vidEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${escHtml(vid)}"
          title="${escHtml(data.name)} technique" allowfullscreen loading="lazy"></iframe>`;
        container.appendChild(vidEl);
      }

      // Connections
      const hasOut = data.outgoing && data.outgoing.length > 0;
      const hasIn  = data.incoming && data.incoming.length > 0;
      if (hasOut || hasIn) {
        const conns = document.createElement('div');
        conns.className = 'tp-connections';

        if (hasOut) {
          const sec = document.createElement('div');
          sec.className = 'tp-conn-section';
          sec.innerHTML = `<h3 class="tp-conn-heading">From here</h3>`;
          for (const group of data.outgoing) {
            const g = document.createElement('div');
            g.className = 'tp-group';
            const label = document.createElement('span');
            label.className = 'tp-group-label';
            label.textContent = group.label;
            const chips = document.createElement('div');
            chips.className = 'tp-chips';
            group.nodes.forEach(n => chips.appendChild(tpChip(n)));
            g.appendChild(label);
            g.appendChild(chips);
            sec.appendChild(g);
          }
          conns.appendChild(sec);
        }

        if (hasIn) {
          const sec = document.createElement('div');
          sec.className = 'tp-conn-section';
          sec.innerHTML = `<h3 class="tp-conn-heading">Leads here from</h3>`;
          for (const group of data.incoming) {
            const g = document.createElement('div');
            g.className = 'tp-group';
            const label = document.createElement('span');
            label.className = 'tp-group-label';
            label.textContent = group.label;
            const chips = document.createElement('div');
            chips.className = 'tp-chips';
            group.nodes.forEach(n => chips.appendChild(tpChip(n)));
            g.appendChild(label);
            g.appendChild(chips);
            sec.appendChild(g);
          }
          conns.appendChild(sec);
        }

        container.appendChild(conns);
      }

      // CTA
      const cta = document.createElement('div');
      cta.className = 'tp-cta';
      const askBtn = document.createElement('button');
      askBtn.className = 'tp-ask-btn';
      askBtn.textContent = `Ask coach about ${data.name} →`;
      askBtn.addEventListener('click', () => {
        fillQuery(`Tell me more about ${data.name}`);
        setMode(hasResults ? 'results' : 'landing');
      });
      const pathBtn = document.createElement('button');
      pathBtn.className = 'tp-path-btn';
      pathBtn.textContent = `Find path to ${data.name} →`;
      pathBtn.addEventListener('click', () => {
        setMode('path');
        if (!pathLoaded) loadPathNodes();
        document.getElementById('path-to-input').value = data.name;
        document.getElementById('path-to-input').focus();
      });
      cta.appendChild(askBtn);
      cta.appendChild(pathBtn);
      container.appendChild(cta);
    }

    async function loadTechnique(id, push = true) {
      if (push) history.pushState({ technique: id }, '', `/technique/${id}`);
      setMode('technique');
      const container = document.getElementById('tp-content');
      container.innerHTML = `<div style="font-family:var(--mono);font-size:0.8rem;color:var(--ink-3)">Loading…</div>`;
      try {
        const data = await fetch(`/api/technique/${encodeURIComponent(id)}`).then(r => {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        });
        document.title = `${data.name} — BJJ World`;
        renderTechnique(data);
      } catch {
        container.innerHTML = `<p style="color:var(--ink-3);font-size:0.88rem">Technique not found.</p>`;
      }
    }

    // ── URL routing ──────────────────────────────────────────
    (function initRouting() {
      const match = location.pathname.match(/^\/technique\/(.+)$/);
      if (match) loadTechnique(decodeURIComponent(match[1]), false);

      window.addEventListener('popstate', () => {
        const m = location.pathname.match(/^\/technique\/(.+)$/);
        if (m) {
          loadTechnique(decodeURIComponent(m[1]), false);
        } else {
          document.title = 'BJJ World';
          setMode(hasResults ? 'results' : 'landing');
        }
      });
    })();

    // ── Init ────────────────────────────────────────────────
    loadNodes();
  </script>
</body>
</html>
