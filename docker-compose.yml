services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tapcodex
      POSTGRES_PASSWORD: tapcodex
      POSTGRES_DB: tapcodex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapcodex"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.14
    environment:
      NEO4J_AUTH: neo4j/tapcodex_local
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  neo4j_data:
